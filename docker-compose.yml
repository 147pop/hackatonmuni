services:
  app:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CI: "true"

  e2e:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /app
    volumes:
      - .:/app
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CI: "true"
